<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-head">
        <div class="brand">
          <span class="brand-mark">◆</span>
          <span class="brand-name">Notes</span>
        </div>
        <div class="head-actions">
          <button id="open-folder" class="icon-btn" title="Open project folder" aria-label="Open project folder">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v1"/><path d="m2.5 19 2.2-6a1 1 0 0 1 .95-.7H21a1 1 0 0 1 .95 1.3l-1.8 5.4a1 1 0 0 1-.95.7H4a1 1 0 0 1-.5-.13"/></svg>
          </button>
          <button id="theme-toggle" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
            <svg class="ico-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="ico-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
          </button>
          <button id="sidebar-collapse" class="icon-btn sidebar-collapse" title="Collapse sidebar" aria-label="Collapse sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M15.5 9.5 13 12l2.5 2.5"/></svg>
          </button>
        </div>
      </div>

      <button id="new-doc" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        New page
      </button>

      <nav id="doc-list" class="doc-list"></nav>
    </aside>

    <!-- Main -->
    <main id="main">
      <header id="topbar">
        <div class="topbar-left">
          <button id="sidebar-open" class="icon-btn sidebar-open" title="Open sidebar" aria-label="Open sidebar" hidden>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="M13 9.5 15.5 12 13 14.5"/></svg>
          </button>
          <div id="breadcrumb"></div>
        </div>
        <div class="topbar-right">
          <button id="status-btn" class="status-btn" title="Page status">
            <span class="status-dot"></span><span class="status-label">Not started</span>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <button id="export-btn" class="topbar-btn" title="Export as Markdown (includes sub-pages)">⬇️ Export</button>
          <div id="save-status" class="save-status" data-state="idle">Saved</div>
        </div>
      </header>

      <div id="doc-scroll" class="doc-scroll">
        <div id="doc-empty" class="doc-empty">
          <div class="empty-art">📝</div>
          <h2>No page open</h2>
          <p>Create a new page or pick one from the sidebar to start writing.</p>
          <button id="empty-new" class="btn btn-primary">Create your first page</button>
        </div>

        <article id="doc" class="doc" hidden>
          <!-- Cover image -->
          <div id="cover" class="cover" hidden>
            <div id="cover-fill" class="cover-fill"></div>
            <div class="cover-actions">
              <button id="cover-change" class="cover-btn">Change cover</button>
              <button id="cover-remove" class="cover-btn">Remove</button>
            </div>
          </div>

          <div class="doc-inner">
            <!-- Page icon (emoji) -->
            <div id="page-icon" class="page-icon" hidden></div>

            <!-- Hover tools: Add icon / Add cover -->
            <div id="page-tools" class="page-tools">
              <button id="add-icon-btn" class="page-tool"><span>😀</span> Add icon</button>
              <button id="add-cover-btn" class="page-tool"><span>🖼️</span> Add cover</button>
            </div>

            <textarea id="title" class="title-input" placeholder="Untitled" spellcheck="false" rows="1"></textarea>
            <div id="editor" class="editor"></div>
          </div>
        </article>
      </div>
    </main>
  </div>

  <!-- Slash command menu -->
  <div id="slash-menu" class="slash-menu" hidden></div>

  <!-- Inline selection toolbar -->
  <div id="inline-toolbar" class="inline-toolbar" hidden>
    <button data-cmd="bold" title="Bold (Ctrl/Cmd+B)"><b>B</b></button>
    <button data-cmd="italic" title="Italic (Ctrl/Cmd+I)"><i>I</i></button>
    <button data-cmd="underline" title="Underline (Ctrl/Cmd+U)"><u>U</u></button>
    <button data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
    <button data-cmd="code" title="Inline code">&lt;/&gt;</button>
    <button data-cmd="link" title="Link">🔗</button>
  </div>

  <!-- Emoji picker -->
  <div id="emoji-picker" class="popover emoji-picker" hidden>
    <div class="emoji-head">
      <button id="emoji-random" class="mini-btn">🎲 Random</button>
      <button id="emoji-remove" class="mini-btn">Remove</button>
    </div>
    <div id="emoji-grid" class="emoji-grid"></div>
  </div>

  <!-- Cover menu -->
  <div id="cover-menu" class="popover cover-menu" hidden>
    <div class="cover-menu-section">Gradient & color</div>
    <div id="cover-swatches" class="cover-swatches"></div>
    <button id="cover-upload" class="mini-btn full">Upload image…</button>
  </div>

  <!-- Comments: fixed docked panel -->
  <aside id="comments-panel" class="comments-panel">
    <div class="cp-head">
      <span class="cp-title">💬 Comments</span>
      <div class="cp-head-actions">
        <button id="cp-expand" class="icon-btn" title="Expand / collapse width" aria-label="Expand">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
        <button id="cp-close" class="icon-btn" title="Close" aria-label="Close">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div id="comment-thread" class="comment-thread cp-thread"></div>
    <div class="comment-compose">
      <textarea id="comment-input" class="comment-input" rows="3" placeholder="Add a comment…  (paste a link or use [text](url))"></textarea>
      <div class="comment-actions">
        <button id="comment-link" class="mini-btn" title="Insert link">🔗 Link</button>
        <span class="spacer"></span>
        <button id="comment-send" class="mini-btn primary">Comment</button>
      </div>
    </div>
  </aside>

  <!-- Page status dropdown -->
  <div id="status-menu" class="popover status-menu" hidden></div>

  <!-- Existing-page picker (Link to page) -->
  <div id="page-picker" class="popover page-picker" hidden>
    <input id="pp-search" class="pp-search" type="text" placeholder="Link to a page…" />
    <div id="pp-list" class="pp-list"></div>
  </div>

  <!-- Block handle menu (delete / duplicate / color / turn into) -->
  <div id="block-menu" class="popover block-menu" hidden></div>

  <!-- Sidebar page options menu -->
  <div id="page-menu" class="popover page-menu" hidden>
    <button class="menu-item" data-act="reattach" hidden>↪️ Re-add to parent page</button>
    <button class="menu-item" data-act="restore" hidden>↩️ Restore to top level</button>
    <button class="menu-item" data-act="rename">✏️ Rename</button>
    <button class="menu-item" data-act="duplicate">⧉ Duplicate</button>
    <button class="menu-item" data-act="export">⬇️ Export Markdown</button>
    <button class="menu-item danger" data-act="delete">🗑️ Delete</button>
  </div>

  <input id="file-picker" type="file" hidden />

  <!-- app modules (load order matters: shared global scope) -->
  <script src="/js/core.js"></script>
  <script src="/js/inline.js"></script>
  <script src="/js/blocks.js"></script>
  <script src="/js/serialize.js"></script>
  <script src="/js/editor.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/pagehead.js"></script>
  <script src="/js/comments.js"></script>
  <script src="/js/blockmenu.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
