# Self-hosted infrastructure for the DataC Calendar module.
#
# Quick start (all-in-Docker):
#   docker compose run --rm migrate     # create/upgrade the schema
#   docker compose up -d db app         # start database + web/API server
# Or run just the DB in Docker and the app on the host with `npm run dev`:
#   docker compose up -d db

services:
  db:
    image: postgres:16-alpine
    container_name: datac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datac}
      POSTGRES_DB: ${POSTGRES_DB:-datac}
    ports:
      # Exposed on localhost only; change the host side for remote access.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - datac_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datac} -d ${POSTGRES_DB:-datac}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Web/API server (Next.js standalone). In-container DATABASE_URL points at the
  # `db` service host, overriding the host-oriented value from .env.
  app:
    build:
      context: .
      target: runner
    container_name: datac-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-datac}:${POSTGRES_PASSWORD:-datac}@db:5432/${POSTGRES_DB:-datac}?schema=public"
    ports:
      - "${PORT:-4321}:4321"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4321/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  # One-shot migration runner: `docker compose run --rm migrate`.
  migrate:
    build:
      context: .
      target: migrator
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-datac}:${POSTGRES_PASSWORD:-datac}@db:5432/${POSTGRES_DB:-datac}?schema=public"
    restart: "no"

volumes:
  datac_pgdata:
